name: build-assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Pillow
        run: pip install pillow
      - name: Fetch extra images
        run: python scripts/fetch-extra-images.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A site/assets/img
          git commit -m "chore: add generated assets (webp)" || echo "nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
