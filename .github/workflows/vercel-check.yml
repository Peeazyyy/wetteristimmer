name: vercel-check

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to check'
        required: false
        default: 'https://wetteristimmer.vercel.app/'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y >/dev/null
          npm i playwright >/dev/null
          npx playwright install --with-deps chromium

      - name: Run Vercel check
        env:
          CHECK_URL: ${{ github.event.inputs.url }}
        run: node scripts/vercel-check.mjs

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A _vercelcheck
          git commit -m "chore: vercel check results" || echo "nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
