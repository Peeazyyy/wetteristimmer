name: site-snapshot

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y >/dev/null
          npm i playwright >/dev/null
          npx playwright install --with-deps chromium

      - name: Fetch generated images
        run: test -f scripts/generated-images.json && node scripts/fetch-generated.mjs || echo "no generated images"

      - name: Capture site snapshot
        run: node scripts/snapshot.mjs

      - name: Commit snapshot back to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A _snapshot site/assets/img
          git commit -m "chore: update site snapshot" || echo "nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
